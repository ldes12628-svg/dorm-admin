<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>宿舍管理員</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; padding: 16px; max-width: 480px; margin: 0 auto; color: #222; }
    h2 { font-size: 18px; margin: 20px 0 10px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .card h3 { margin: 0 0 6px; font-size: 15px; }
    .card p { margin: 2px 0; font-size: 13px; color: #666; }
    button { font-size: 15px; padding: 10px 14px; border-radius: 8px; border: none; background: #06c755; color: #fff; margin-top: 6px; }
    button.secondary { background: #eee; color: #333; }
    select, input, textarea { font-size: 15px; padding: 10px; width: 100%; box-sizing: border-box; margin: 6px 0; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; }
    #status { text-align: center; padding: 40px 0; color: #888; }
    #bindScreen, #mainScreen { display: none; }
    .status-row { padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    .status-row .row-top { display: flex; justify-content: space-between; }
    .status-row .row-detail { margin-top: 3px; font-size: 12px; color: #888; display: flex; justify-content: flex-end; gap: 10px; }
    .status-row .s-paid { color: #06c755; font-weight: bold; }
    .status-row .s-unconfirmed { color: #d68a00; font-weight: bold; }
    .status-row .s-unpaid { color: #d33; font-weight: bold; }
    .status-row .s-partial { color: #ff8c00; font-weight: bold; }
    #roomDueInfo { font-size: 13px; color: #888; margin: -2px 0 6px; min-height: 16px; }
    #receiptResult { background: #f0fff4; border: 1px solid #06c755; border-radius: 10px; padding: 14px; margin-top: 10px; display: none; }
    #receiptResult.partial { background: #fff8ec; border-color: #ff8c00; }
    #receiptResult .r-note { font-weight: bold; }
    .expense-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 13px; }
    .expense-row .e-item { color: #333; }
    .expense-row .e-note { color: #999; font-size: 12px; }
    .expense-row .e-amount { font-weight: bold; color: #d33; }
    #expenseTotal { text-align: right; font-weight: bold; margin-top: 8px; font-size: 14px; }
    .msg-ok { color: #06c755; font-weight: bold; font-size: 14px; }
    .msg-err { color: #c00; font-weight: bold; font-size: 14px; }

    /* 三聯式收據列印樣式 */
    #printArea { display: none; }
    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea { display: block; position: absolute; top: 0; left: 0; width: 100%; }
      .receipt-copy { page-break-inside: avoid; border-bottom: 1px dashed #000; padding: 12px 16px; box-sizing: border-box; }
      .receipt-copy:last-child { border-bottom: none; }
      .receipt-title { font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 6px; }
      .receipt-row { display: flex; font-size: 12px; margin: 3px 0; }
      .receipt-row .label { width: 70px; color: #333; }
      .receipt-row .value { flex: 1; font-weight: bold; }
      .receipt-sign { margin-top: 10px; font-size: 12px; display: flex; justify-content: space-between; }
    }
  </style>
</head>
<body>

  <div id="status">載入中…</div>

  <div id="bindScreen">
    <h2>管理員綁定</h2>
    <p>請輸入公司給你的驗證碼完成第一次綁定：</p>
    <input id="bindCode" placeholder="輸入驗證碼">
    <button onclick="doBind()">送出</button>
    <p id="bindMsg" style="color:#c00;"></p>
  </div>

  <div id="mainScreen">
    <h2>繳費單查詢</h2>
    <select id="billPeriodSelect" onchange="loadBills()"></select>
    <div id="billList"></div>

    <h2>繳費狀況查詢</h2>
    <select id="statusPeriodSelect" onchange="loadStatus()"></select>
    <label style="display:block; margin:8px 0; font-size:14px;">
      <input type="checkbox" id="onlyUnpaid" checked onchange="renderStatus()"> 只顯示未結清（未銷帳/已繳未銷/部分繳款）
    </label>
    <div id="statusList"></div>

    <h2>現金收款登錄</h2>
    <select id="roomSelect" onchange="showRoomDue()"></select>
    <div id="roomDueInfo"></div>
    <input id="amountInput" type="number" placeholder="收款金額">
    <button onclick="submitCash()">確認收款並產生收據</button>
    <div id="receiptResult"></div>

    <h2>支出登錄</h2>
    <select id="expensePeriodSelect"></select>
    <input id="expenseDate" type="date">
    <input id="expenseItem" placeholder="支出項目（例如：水電修繕）">
    <input id="expenseAmount" type="number" placeholder="金額">
    <textarea id="expenseNote" placeholder="備註（選填）" rows="2"></textarea>
    <button onclick="submitExpense()">登錄支出</button>
    <p id="expenseMsg"></p>
    <button class="secondary" onclick="loadExpenses()">查詢本期支出</button>
    <div id="expenseList"></div>
    <div id="expenseTotal"></div>

    <h2>新增租客</h2>
    <input id="tenantRoom" placeholder="房號（例如：1AB）">
    <input id="tenantName" placeholder="租戶姓名">
    <input id="tenantRent" type="number" placeholder="房屋租金">
    <input id="tenantDeposit" type="number" placeholder="押金">
    <input id="tenantMoveIn" type="date">
    <input id="tenantPhone" placeholder="手機號碼">
    <button onclick="submitTenant()">新增租客</button>
    <p id="tenantMsg"></p>
  </div>

  <!-- 以下區塊平常隱藏，只有按「列印收據」時，透過瀏覽器列印功能才會印出來 -->
  <div id="printArea">
    <div class="receipt-copy">
      <div class="receipt-title"><span>啟乘工程有限公司 現金收據</span><span>存根聯</span></div>
      <div class="receipt-row"><span class="label">收據編號</span><span class="value" id="p-no-1"></span></div>
      <div class="receipt-row"><span class="label">繳費期別</span><span class="value" id="p-period-1"></span></div>
      <div class="receipt-row"><span class="label">房號</span><span class="value" id="p-room-1"></span></div>
      <div class="receipt-row"><span class="label">本次收款</span><span class="value" id="p-amount-1"></span></div>
      <div class="receipt-row"><span class="label">日期</span><span class="value" id="p-date-1"></span></div>
      <div class="receipt-row"><span class="label">繳費狀態</span><span class="value" id="p-note-1"></span></div>
      <div class="receipt-sign"><span>開立人：管理員</span><span>簽章：__________</span></div>
    </div>
    <div class="receipt-copy">
      <div class="receipt-title"><span>啟乘工程有限公司 現金收據</span><span>收據聯（交租戶）</span></div>
      <div class="receipt-row"><span class="label">收據編號</span><span class="value" id="p-no-2"></span></div>
      <div class="receipt-row"><span class="label">繳費期別</span><span class="value" id="p-period-2"></span></div>
      <div class="receipt-row"><span class="label">房號</span><span class="value" id="p-room-2"></span></div>
      <div class="receipt-row"><span class="label">本次收款</span><span class="value" id="p-amount-2"></span></div>
      <div class="receipt-row"><span class="label">日期</span><span class="value" id="p-date-2"></span></div>
      <div class="receipt-row"><span class="label">繳費狀態</span><span class="value" id="p-note-2"></span></div>
      <div class="receipt-sign"><span>開立人：管理員</span><span>簽章：__________</span></div>
    </div>
    <div class="receipt-copy">
      <div class="receipt-title"><span>啟乘工程有限公司 現金收據</span><span>報帳聯</span></div>
      <div class="receipt-row"><span class="label">收據編號</span><span class="value" id="p-no-3"></span></div>
      <div class="receipt-row"><span class="label">繳費期別</span><span class="value" id="p-period-3"></span></div>
      <div class="receipt-row"><span class="label">房號</span><span class="value" id="p-room-3"></span></div>
      <div class="receipt-row"><span class="label">本次收款</span><span class="value" id="p-amount-3"></span></div>
      <div class="receipt-row"><span class="label">日期</span><span class="value" id="p-date-3"></span></div>
      <div class="receipt-row"><span class="label">繳費狀態</span><span class="value" id="p-note-3"></span></div>
      <div class="receipt-sign"><span>開立人：管理員</span><span>簽章：__________</span></div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    var LIFF_ID = '2010574364-GyqCDEpu'; // 替換成 LINE Developers Console 拿到的 LIFF ID

    // 換成你的 Apps Script 部署網址（結尾是 /exec）
    var API_BASE = 'https://script.google.com/macros/s/AKfycbyJ-r3ocN9riXeskpYDTJyG5cVLVJ2tmZzjxX-ljFXujoRex0AdLp7jpPOKfhAt-Bk/exec';

    var userId = null;
    var allBills = [];
    var allStatus = [];
    var periodOptions = [];

    window.onerror = function (msg, url, line) {
      document.getElementById('status').style.display = 'block';
      document.getElementById('status').innerText = '發生錯誤：' + msg + '（第 ' + line + ' 行）';
    };

    function callApi(action, params) {
      params = params || {};
      params.action = action;
      var query = Object.keys(params)
        .map(function (k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
        .join('&');
      return fetch(API_BASE + '?' + query).then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      });
    }

    document.getElementById('status').innerText = '正在初始化 LIFF…';

    liff.init({ liffId: LIFF_ID }).then(function () {
      document.getElementById('status').innerText = '正在確認登入狀態…';
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      document.getElementById('status').innerText = '正在取得個人資料…';
      liff.getProfile().then(function (profile) {
        userId = profile.userId;
        document.getElementById('status').innerText = '正在確認管理員身分…';
        checkBinding();
      }).catch(function (err) {
        document.getElementById('status').innerText = '取得個人資料失敗：' + err;
      });
    }).catch(function (err) {
      document.getElementById('status').innerText = '初始化失敗：' + err;
    });

    function checkBinding() {
      callApi('isManagerBound', { userId: userId }).then(function (bound) {
        document.getElementById('status').style.display = 'none';
        if (bound) {
          showMain();
        } else {
          document.getElementById('bindScreen').style.display = 'block';
        }
      }).catch(function (err) {
        document.getElementById('status').innerText = '連線後端失敗：' + err.message;
      });
    }

    function doBind() {
      var code = document.getElementById('bindCode').value.trim();
      callApi('bindManager', { userId: userId, code: code }).then(function (res) {
        if (res.success) {
          document.getElementById('bindScreen').style.display = 'none';
          showMain();
        } else {
          document.getElementById('bindMsg').innerText = res.message;
        }
      }).catch(function (err) {
        document.getElementById('bindMsg').innerText = '連線失敗：' + err.message;
      });
    }

    function showMain() {
      document.getElementById('mainScreen').style.display = 'block';
      loadPeriodOptions();
      loadRooms();
    }

    function loadPeriodOptions() {
      callApi('getPeriodOptions').then(function (options) {
        periodOptions = options;
        fillPeriodSelect('statusPeriodSelect', options);
        fillPeriodSelect('expensePeriodSelect', options);
        fillPeriodSelect('billPeriodSelect', options);
        loadStatus();
        loadBills();
        var today = new Date();
        var y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
        document.getElementById('expenseDate').value = y + '-' + m + '-' + d;
      }).catch(function (err) {
        document.getElementById('statusList').innerHTML = '<p style="color:#c00;">期別載入失敗：' + err.message + '</p>';
      });
    }

    function fillPeriodSelect(selectId, options) {
      var select = document.getElementById(selectId);
      select.innerHTML = '';
      options.forEach(function (o) {
        var opt = document.createElement('option');
        opt.value = o.period;
        opt.innerText = o.label;
        select.appendChild(opt);
      });
    }

    function loadRooms() {
      callApi('getAllRooms').then(function (rooms) {
        renderRoomOptions(rooms);
      }).catch(function (err) {
        var select = document.getElementById('roomSelect');
        select.innerHTML = '';
        var opt = document.createElement('option');
        opt.innerText = '房號載入失敗：' + err.message;
        select.appendChild(opt);
      });
    }

    function loadBills() {
      var period = document.getElementById('billPeriodSelect').value;
      callApi('getMonthlyBills', { period: period }).then(function (bills) {
        allBills = bills;
        renderBills(bills);
      }).catch(function (err) {
        document.getElementById('billList').innerHTML = '<p style="color:#c00;">載入失敗：' + err.message + '</p>';
      });
    }

    function renderBills(bills) {
      var list = document.getElementById('billList');
      if (bills.length === 0) {
        list.innerHTML = '<p>這期尚未匯入繳費單</p>';
        return;
      }
      list.innerHTML = bills.map(function (b) {
        return '<div class="card">' +
          '<h3>' + b.房號 + ' ' + b.租戶姓名 + '</h3>' +
          '<p>電費：' + b.電費 + ' 元｜水費：' + b.水費 + ' 元｜應繳：' + b.應繳金額 + ' 元</p>' +
          '<button onclick="shareBill(\'' + b.房號 + '\', \'' + (b.繳費單圖片網址 || '') + '\')">轉發給租戶</button>' +
          '</div>';
      }).join('');
    }

    function renderRoomOptions(rooms) {
      var select = document.getElementById('roomSelect');
      select.innerHTML = '';
      rooms.forEach(function (r) {
        var opt = document.createElement('option');
        opt.value = r.房號;
        opt.innerText = r.房號 + ' ' + r.租戶姓名;
        select.appendChild(opt);
      });
      showRoomDue();
    }

    function showRoomDue() {
      var room = document.getElementById('roomSelect').value;
      var info = document.getElementById('roomDueInfo');
      if (!room) { info.innerText = ''; return; }
      info.innerText = '查詢中…';
      callApi('getPaymentStatus').then(function (list) {
        var found = list.filter(function (r) { return r.房號 === room; })[0];
        if (!found) { info.innerText = ''; return; }
        if (found.應繳金額 == null) {
          info.innerText = '本期尚未匯入這個房號的帳單金額';
        } else if (found.狀態 === '已銷帳') {
          info.innerText = '本期已結清（已收 ' + found.已收金額 + ' 元）';
        } else {
          info.innerText = '應繳 ' + found.應繳金額 + ' 元｜已收 ' + found.已收金額 + ' 元｜尚欠 ' + found.尚欠金額 + ' 元';
        }
      }).catch(function () {
        info.innerText = '';
      });
    }

    function shareBill(room, imageUrl) {
      if (!imageUrl) {
        alert('這個房號的繳費單圖片網址尚未設定');
        return;
      }
      liff.shareTargetPicker([
        {
          type: 'image',
          originalContentUrl: imageUrl,
          previewImageUrl: imageUrl
        },
        {
          type: 'text',
          text: room + ' 本期繳費單，請確認金額並於期限前繳費，謝謝。'
        }
      ]).catch(function (err) {
        alert('分享失敗：' + err);
      });
    }

    function loadStatus() {
      var period = document.getElementById('statusPeriodSelect').value;
      document.getElementById('statusList').innerHTML = '查詢中…';
      callApi('getPaymentStatus', { period: period }).then(function (list) {
        allStatus = list;
        renderStatus();
      }).catch(function (err) {
        document.getElementById('statusList').innerHTML = '<p style="color:#c00;">查詢失敗：' + err.message + '</p>';
      });
    }

    function renderStatus() {
      var onlyUnpaid = document.getElementById('onlyUnpaid').checked;
      var list = onlyUnpaid ? allStatus.filter(function (r) { return r.狀態 !== '已銷帳'; }) : allStatus;
      var box = document.getElementById('statusList');
      if (allStatus.length === 0) {
        box.innerHTML = '';
        return;
      }
      if (list.length === 0) {
        box.innerHTML = '<p>這期全部房號都已銷帳</p>';
        return;
      }
      var clsMap = { 已銷帳: 's-paid', 已繳未銷: 's-unconfirmed', 未銷帳: 's-unpaid', 部分繳款: 's-partial' };
      box.innerHTML = list.map(function (r) {
        var cls = clsMap[r.狀態] || 's-unpaid';
        var detail = '';
        if (r.應繳金額 !== undefined && r.應繳金額 !== null && (r.已收金額 > 0 || r.狀態 === '部分繳款')) {
          detail = '<div class="row-detail">' +
            '<span>已收 ' + r.已收金額 + ' 元</span>' +
            '<span>應繳 ' + r.應繳金額 + ' 元</span>' +
            (r.尚欠金額 > 0 ? '<span>尚欠 ' + r.尚欠金額 + ' 元</span>' : '') +
            '</div>';
        }
        return '<div class="status-row">' +
          '<div class="row-top"><span>' + r.房號 + ' ' + r.租戶姓名 + '</span><span class="' + cls + '">' + r.狀態 + '</span></div>' +
          detail +
          '</div>';
      }).join('');
    }

    function submitCash() {
      var room = document.getElementById('roomSelect').value;
      var amount = document.getElementById('amountInput').value;
      if (!room || !amount) {
        alert('請選擇房號並輸入金額');
        return;
      }
      callApi('submitCashPayment', { room: room, amount: amount, userId: userId }).then(function (res) {
        if (!res.success) {
          alert(res.message);
          return;
        }
        var period = res.receiptNo.split('-')[0];
        var isPartial = res.狀態 === '部分繳款';
        var note = isPartial
          ? '部分繳款，尚欠 ' + res.尚欠金額 + ' 元'
          : '已全額結清';

        var box = document.getElementById('receiptResult');
        box.className = isPartial ? 'partial' : '';
        box.style.display = 'block';
        box.innerHTML = '<p>收款成功</p>' +
          '<p>收據編號：' + res.receiptNo + '</p>' +
          '<p>時間：' + res.date + '</p>' +
          '<p>本次收款：' + res.本次收款 + ' 元｜累計已收：' + res.累計已收 + ' 元' + (res.應繳金額 != null ? '｜應繳：' + res.應繳金額 + ' 元' : '') + '</p>' +
          '<p class="r-note">' + note + '</p>' +
          '<button onclick="printReceipt(\'' + res.receiptNo + '\',\'' + period + '\',\'' + room + '\',\'' + res.本次收款 + '\',\'' + res.date + '\',\'' + note + '\')">列印三聯收據</button>' +
          '<button class="secondary" onclick="location.reload()">完成，繼續下一筆</button>';
        document.getElementById('amountInput').value = '';
      }).catch(function (err) {
        alert('登錄失敗：' + err.message);
      });
    }

    function printReceipt(no, period, room, amount, date, note) {
      for (var i = 1; i <= 3; i++) {
        document.getElementById('p-no-' + i).innerText = no;
        document.getElementById('p-period-' + i).innerText = period;
        document.getElementById('p-room-' + i).innerText = room;
        document.getElementById('p-amount-' + i).innerText = amount + ' 元';
        document.getElementById('p-date-' + i).innerText = date;
        document.getElementById('p-note-' + i).innerText = note || '已全額結清';
      }
      window.print();
    }

    function submitExpense() {
      var period = document.getElementById('expensePeriodSelect').value;
      var date = document.getElementById('expenseDate').value;
      var item = document.getElementById('expenseItem').value.trim();
      var amount = document.getElementById('expenseAmount').value;
      var note = document.getElementById('expenseNote').value.trim();
      var msg = document.getElementById('expenseMsg');

      if (!item || !amount) {
        msg.className = 'msg-err';
        msg.innerText = '請輸入項目名稱與金額';
        return;
      }

      callApi('submitExpense', { period: period, date: date, item: item, amount: amount, note: note, userId: userId }).then(function (res) {
        if (!res.success) {
          msg.className = 'msg-err';
          msg.innerText = res.message;
          return;
        }
        msg.className = 'msg-ok';
        msg.innerText = '登錄成功：' + res.item + ' ' + res.amount + ' 元';
        document.getElementById('expenseItem').value = '';
        document.getElementById('expenseAmount').value = '';
        document.getElementById('expenseNote').value = '';
        loadExpenses();
      }).catch(function (err) {
        msg.className = 'msg-err';
        msg.innerText = '登錄失敗：' + err.message;
      });
    }

    function loadExpenses() {
      var period = document.getElementById('expensePeriodSelect').value;
      var box = document.getElementById('expenseList');
      var totalBox = document.getElementById('expenseTotal');
      box.innerHTML = '查詢中…';
      totalBox.innerText = '';
      callApi('getExpenses', { period: period }).then(function (res) {
        if (res.items.length === 0) {
          box.innerHTML = '<p>這期尚無支出紀錄</p>';
          totalBox.innerText = '';
          return;
        }
        box.innerHTML = res.items.map(function (e) {
          return '<div class="expense-row">' +
            '<div><div class="e-item">' + e.日期 + ' ' + e.項目 + '</div>' +
            (e.備註 ? '<div class="e-note">' + e.備註 + '</div>' : '') + '</div>' +
            '<div class="e-amount">' + e.金額 + ' 元</div>' +
            '</div>';
        }).join('');
        totalBox.innerText = '本期支出合計：' + res.total + ' 元';
      }).catch(function (err) {
        box.innerHTML = '<p style="color:#c00;">查詢失敗：' + err.message + '</p>';
      });
    }

    function submitTenant() {
      var room = document.getElementById('tenantRoom').value.trim();
      var name = document.getElementById('tenantName').value.trim();
      var rent = document.getElementById('tenantRent').value;
      var deposit = document.getElementById('tenantDeposit').value;
      var moveIn = document.getElementById('tenantMoveIn').value;
      var phone = document.getElementById('tenantPhone').value.trim();
      var msg = document.getElementById('tenantMsg');

      if (!room || !name) {
        msg.className = 'msg-err';
        msg.innerText = '請輸入房號與租戶姓名';
        return;
      }

      callApi('addTenant', {
        room: room, name: name, rent: rent, deposit: deposit,
        moveInDate: moveIn, phone: phone, userId: userId
      }).then(function (res) {
        if (!res.success) {
          msg.className = 'msg-err';
          msg.innerText = res.message;
          return;
        }
        msg.className = 'msg-ok';
        msg.innerText = '新增成功：' + res.room + ' ' + res.name;
        document.getElementById('tenantRoom').value = '';
        document.getElementById('tenantName').value = '';
        document.getElementById('tenantRent').value = '';
        document.getElementById('tenantDeposit').value = '';
        document.getElementById('tenantMoveIn').value = '';
        document.getElementById('tenantPhone').value = '';
        loadRooms();
      }).catch(function (err) {
        msg.className = 'msg-err';
        msg.innerText = '新增失敗：' + err.message;
      });
    }
  </script>
</body>
</html>
